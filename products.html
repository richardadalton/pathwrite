<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Products — Devjoy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    html, body {
      height: 100%;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /*
      Triangular arrangement. Each wrapper is W×W; the rotated inner square
      (W/√2 × W/√2) has its 4 corners exactly at the wrapper edges, so
      wrappers positioned flush share a corner precisely.

      Layout (wrapper positions, origin = top-left of container):
        rulewrite : left = W/2,  top = 0
        pathwrite : left = 0,    top = W/2
        authwrite : left = W,    top = W/2

      This means:
        rulewrite bottom  = pathwrite right = authwrite left  (all three meet)
        rulewrite left    = pathwrite top
        rulewrite right   = authwrite top

      Container: width = 2W, height = 1.5W
    */
    .products {
      --w: 280px;
      position: relative;
      width: calc(2 * var(--w));
      height: calc(2 * var(--w));
    }

    .diamond-wrap {
      --inner: calc(var(--w) * 0.7071);
      position: absolute;
      width: var(--w);
      height: var(--w);
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
    }

    .diamond-wrap--pathwrite {
      left: 0;
      top: calc(0.5 * var(--w));
    }

    .diamond-wrap--authwrite {
      left: var(--w);
      top: calc(0.5 * var(--w));
    }

    .diamond-wrap--rulewrite {
      left: calc(0.5 * var(--w));
      top: 0;
    }

    .diamond-wrap--jobwrite {
      left: calc(0.5 * var(--w));
      top: var(--w);
    }

    .diamond {
      width: var(--inner);
      height: var(--inner);
      transform: rotate(45deg);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: box-shadow 0.25s ease, filter 0.25s ease;
    }

    .diamond-label {
      transform: rotate(-45deg);
      font-family: var(--font-sans);
      font-size: 1rem;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.92);
      letter-spacing: 0.04em;
      white-space: nowrap;
      pointer-events: none;
    }

    /* Per-product gradients */
    .diamond--pathwrite {
      background: linear-gradient(135deg, #5b21b6 0%, #a78bfa 100%);
    }

    .diamond--authwrite {
      background: linear-gradient(135deg, #064e3b 0%, #34d399 100%);
    }

    .diamond--rulewrite {
      background: linear-gradient(135deg, #78350f 0%, #fbbf24 100%);
    }

    .diamond--jobwrite {
      background: linear-gradient(135deg, #111118 0%, #2a2a3a 100%);
      border: 1px solid #2a2a3a;
    }

    /* Hover: brighten + colour-matched glow */
    .diamond-wrap:hover .diamond--pathwrite {
      filter: brightness(1.1);
      box-shadow: 0 0 52px rgba(139, 92, 246, 0.6);
    }

    .diamond-wrap:hover .diamond--authwrite {
      filter: brightness(1.1);
      box-shadow: 0 0 52px rgba(16, 185, 129, 0.6);
    }

    .diamond-wrap:hover .diamond--rulewrite {
      filter: brightness(1.1);
      box-shadow: 0 0 52px rgba(245, 158, 11, 0.6);
    }

    .diamond-label--muted {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
    }

    .diamond-label--muted span {
      color: rgba(255, 255, 255, 0.6);
    }

    .diamond-label--muted small {
      font-size: 0.65rem;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* Responsive */
    @media (max-width: 680px) {
      .products {
        --w: 160px;
      }

      .diamond-label {
        font-size: 0.65rem;
      }

      .diamond-label--muted small {
        font-size: 0.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="products">

    <a href="rulewrite.html" class="diamond-wrap diamond-wrap--rulewrite" aria-label="rulewrite">
      <div class="diamond diamond--rulewrite">
        <span class="diamond-label">rulewrite</span>
      </div>
    </a>

    <a href="index.html" class="diamond-wrap diamond-wrap--pathwrite" aria-label="pathwrite">
      <div class="diamond diamond--pathwrite">
        <span class="diamond-label">pathwrite</span>
      </div>
    </a>

    <a href="authwrite.html" class="diamond-wrap diamond-wrap--authwrite" aria-label="authwrite">
      <div class="diamond diamond--authwrite">
        <span class="diamond-label">authwrite</span>
      </div>
    </a>

    <div class="diamond-wrap diamond-wrap--jobwrite" aria-label="jobwrite — coming soon">
      <div class="diamond diamond--jobwrite">
        <div class="diamond-label diamond-label--muted" style="transform: rotate(-45deg);">
          <span>jobwrite</span>
          <small>coming soon</small>
        </div>
      </div>
    </div>

  </div>
</body>
</html>
