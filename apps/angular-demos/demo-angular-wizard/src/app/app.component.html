<main class="page">

  <div class="page-header">
    <h1>User Onboarding</h1>
    <p class="subtitle">A 4-step wizard with guards, validation, and a final review.</p>
  </div>

  <!-- ── Cancelled ──────────────────────────────────────────────────────────── -->
  @if (isCancelled) {
    <section class="result-panel cancel-panel">
      <div class="result-icon">✖</div>
      <h2>Onboarding Cancelled</h2>
      <p>Your profile was not saved.</p>
      <button type="button" class="btn-secondary" (click)="isCancelled = false">Try Again</button>
    </section>
  }

  <!-- ── Wizard — stays mounted; shows completion panel via [pwShellCompletion] ─ -->
  @if (!isCancelled) {
    <pw-shell
      [path]="onboardingPath"
      [initialData]="initialData"
      completeLabel="Complete Onboarding"
      cancelLabel="Cancel"
      validationDisplay="inline"
      (cancel)="onCancel()"
    >
      <!-- Custom completion panel shown when snapshot.status === "completed" -->
      <ng-template pwShellCompletion>
        <app-completion-panel />
      </ng-template>

      <ng-template pwStep="personal-info">
        <app-personal-info-step />
      </ng-template>

      <ng-template pwStep="about-you">
        <app-about-you-step />
      </ng-template>

      <ng-template pwStep="preferences">
        <app-preferences-step />
      </ng-template>

      <ng-template pwStep="review">
        <app-review-step />
      </ng-template>
    </pw-shell>
  }

</main>
