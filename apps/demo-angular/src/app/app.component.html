<main class="page">
  <h1>{{ title }}</h1>

  <section class="panel">
    <h2>Controls</h2>
    <div class="button-row">
      <button type="button" (click)="startMain()">Start Main Path</button>
      <button type="button" (click)="startSub()" [disabled]="!snapshot()">Start Sub-path</button>
      <button type="button" (click)="previous()" [disabled]="!snapshot()">Previous</button>
      <button type="button" (click)="next()" [disabled]="!snapshot()">Next</button>
      <button type="button" (click)="cancel()" [disabled]="!snapshot()">Cancel</button>
    </div>
  </section>

  <section class="panel" *ngIf="snapshot() as s; else noPath">
    <h2>Current State</h2>
    <p><strong>Path:</strong> {{ s.pathId }}</p>
    <p><strong>Step:</strong> {{ s.stepId }} ({{ s.stepIndex + 1 }} / {{ s.stepCount }})</p>
    <p><strong>Nesting level:</strong> {{ s.nestingLevel }}</p>
    <p><strong>Args:</strong> {{ s.args | json }}</p>
  </section>

  <ng-template #noPath>
    <section class="panel">
      <h2>Current State</h2>
      <p>No active path.</p>
    </section>
  </ng-template>

  <section class="panel">
    <h2>Event Log</h2>
    <ul>
      <li *ngFor="let event of eventLog">{{ event }}</li>
      <li *ngIf="eventLog.length === 0">No events yet.</li>
    </ul>
  </section>
</main>
